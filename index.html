<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סורק מניות - MA / Volume / RSI</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b22;
      --border: #2a313c;
      --text: #e6edf3;
      --text-soft: #8b949e;
      --accent: #2f81f7;
      --green: #26a69a;
      --red: #ef5350;
      --ma20: #f7b500;
      --ma150: #ab47bc;
      --ma200: #29b6f6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", Arial, sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    input, select, button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
    }
    input#ticker { width: 140px; text-transform: uppercase; }
    input.ma-input { width: 60px; padding: 8px 8px; text-align: center; }
    .ma-group { display: flex; align-items: center; gap: 4px; }
    .ma-group label { font-size: 12px; color: var(--text-soft); }
    .ma-swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      padding: 8px 20px;
      font-size: 13px;
      color: var(--text-soft);
      min-height: 30px;
    }
    .status.error { color: var(--red); }
    .info-bar {
      display: flex;
      gap: 18px;
      padding: 10px 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-bar .item { display: flex; gap: 6px; align-items: center; }
    .info-bar .label { color: var(--text-soft); }
    .info-bar .val { font-weight: 600; }
    .legend {
      display: flex;
      gap: 14px;
      padding: 8px 20px;
      font-size: 12px;
      color: var(--text-soft);
      flex-wrap: wrap;
    }
    .legend .dot { display: inline-block; width: 10px; height: 3px; vertical-align: middle; margin-left: 4px; border-radius: 2px; }
    .charts {
      padding: 8px 12px 20px;
    }
    .chart-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .chart-title {
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-soft);
      border-bottom: 1px solid var(--border);
    }
    #priceChart { height: 420px; }
    #volumeChart { height: 140px; }
    #rsiChart { height: 160px; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    @media (max-width: 600px) {
      input { width: 100px; }
      header h1 { font-size: 16px; }
      #priceChart { height: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>סורק מניות</h1>
    <div class="controls">
      <input id="ticker" placeholder="AAPL" value="AAPL" autocomplete="off" />
      <select id="range">
        <option value="1mo">חודש</option>
        <option value="2mo">חודשיים</option>
        <option value="3mo">3 חודשים</option>
        <option value="6mo">חצי שנה</option>
        <option value="1y">שנה</option>
        <option value="2y" selected>שנתיים</option>
        <option value="5y">5 שנים</option>
        <option value="max">מקסימום</option>
      </select>
      <div class="ma-group">
        <span class="ma-swatch" style="background:var(--ma20)"></span>
        <label>MA</label>
        <input id="maP1" class="ma-input" type="number" min="2" max="500" value="20" />
      </div>
      <div class="ma-group">
        <span class="ma-swatch" style="background:var(--ma150)"></span>
        <label>MA</label>
        <input id="maP2" class="ma-input" type="number" min="2" max="500" value="150" />
      </div>
      <div class="ma-group">
        <span class="ma-swatch" style="background:var(--ma200)"></span>
        <label>MA</label>
        <input id="maP3" class="ma-input" type="number" min="2" max="500" value="200" />
      </div>
      <button id="loadBtn">טען</button>
    </div>
  </header>

  <div class="status" id="status">הקלד סימול (לדוגמה: AAPL, MSFT, TSLA, או TEVA.TA לבורסת ת"א) ולחץ "טען"</div>

  <div class="info-bar" id="infoBar" style="display:none;">
    <div class="item"><span class="label">סימול:</span><span class="val" id="iSymbol">-</span></div>
    <div class="item"><span class="label">מחיר:</span><span class="val" id="iPrice">-</span></div>
    <div class="item"><span class="label">שינוי:</span><span class="val" id="iChange">-</span></div>
    <div class="item"><span class="label" id="lblMa1">MA20:</span><span class="val" id="iMa20">-</span></div>
    <div class="item"><span class="label" id="lblMa2">MA150:</span><span class="val" id="iMa150">-</span></div>
    <div class="item"><span class="label" id="lblMa3">MA200:</span><span class="val" id="iMa200">-</span></div>
    <div class="item"><span class="label">RSI(14):</span><span class="val" id="iRsi">-</span></div>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:var(--ma20)"></span><span id="legMa1">MA 20</span></span>
    <span><span class="dot" style="background:var(--ma150)"></span><span id="legMa2">MA 150</span></span>
    <span><span class="dot" style="background:var(--ma200)"></span><span id="legMa3">MA 200</span></span>
  </div>

  <div class="charts">
    <div class="chart-box">
      <div class="chart-title">מחיר + ממוצעים נעים</div>
      <div id="priceChart"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">נפח מסחר (Volume)</div>
      <div id="volumeChart"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">RSI (14)</div>
      <div id="rsiChart"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const infoBar = $('infoBar');

    const chartCommon = {
      layout: {
        background: { color: '#161b22' },
        textColor: '#e6edf3',
      },
      grid: {
        vertLines: { color: '#2a313c' },
        horzLines: { color: '#2a313c' },
      },
      rightPriceScale: { borderColor: '#2a313c' },
      timeScale: { borderColor: '#2a313c', timeVisible: false },
      crosshair: { mode: 1 },
    };

    const priceChart = LightweightCharts.createChart($('priceChart'), {
      ...chartCommon,
      height: $('priceChart').clientHeight,
    });
    const volumeChart = LightweightCharts.createChart($('volumeChart'), {
      ...chartCommon,
      height: $('volumeChart').clientHeight,
    });
    const rsiChart = LightweightCharts.createChart($('rsiChart'), {
      ...chartCommon,
      height: $('rsiChart').clientHeight,
    });

    const candleSeries = priceChart.addCandlestickSeries({
      upColor: '#26a69a', downColor: '#ef5350',
      borderUpColor: '#26a69a', borderDownColor: '#ef5350',
      wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    });
    const ma20Series  = priceChart.addLineSeries({ color: '#f7b500', lineWidth: 2, priceLineVisible: false });
    const ma150Series = priceChart.addLineSeries({ color: '#ab47bc', lineWidth: 2, priceLineVisible: false });
    const ma200Series = priceChart.addLineSeries({ color: '#29b6f6', lineWidth: 2, priceLineVisible: false });

    const volumeSeries = volumeChart.addHistogramSeries({
      priceFormat: { type: 'volume' },
      priceScaleId: '',
    });
    volumeChart.priceScale('').applyOptions({ scaleMargins: { top: 0.1, bottom: 0 } });

    const rsiSeries = rsiChart.addLineSeries({ color: '#2f81f7', lineWidth: 2 });
    rsiSeries.createPriceLine({ price: 70, color: '#ef5350', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '70' });
    rsiSeries.createPriceLine({ price: 30, color: '#26a69a', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '30' });

    // Sync time scales across the 3 charts
    function syncTimeScales() {
      const charts = [priceChart, volumeChart, rsiChart];
      charts.forEach((src) => {
        src.timeScale().subscribeVisibleLogicalRangeChange((range) => {
          if (!range) return;
          charts.forEach((dst) => { if (dst !== src) dst.timeScale().setVisibleLogicalRange(range); });
        });
      });
    }
    syncTimeScales();

    // Resize on window resize
    function resizeCharts() {
      priceChart.applyOptions({ width: $('priceChart').clientWidth });
      volumeChart.applyOptions({ width: $('volumeChart').clientWidth });
      rsiChart.applyOptions({ width: $('rsiChart').clientWidth });
    }
    window.addEventListener('resize', resizeCharts);
    resizeCharts();

    // --- Indicators ---
    function sma(closes, period) {
      const out = new Array(closes.length).fill(null);
      let sum = 0;
      for (let i = 0; i < closes.length; i++) {
        sum += closes[i];
        if (i >= period) sum -= closes[i - period];
        if (i >= period - 1) out[i] = sum / period;
      }
      return out;
    }

    function rsi(closes, period = 14) {
      const out = new Array(closes.length).fill(null);
      if (closes.length <= period) return out;
      let gain = 0, loss = 0;
      for (let i = 1; i <= period; i++) {
        const d = closes[i] - closes[i - 1];
        if (d >= 0) gain += d; else loss -= d;
      }
      let avgG = gain / period;
      let avgL = loss / period;
      out[period] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
      for (let i = period + 1; i < closes.length; i++) {
        const d = closes[i] - closes[i - 1];
        const g = d > 0 ? d : 0;
        const l = d < 0 ? -d : 0;
        avgG = (avgG * (period - 1) + g) / period;
        avgL = (avgL * (period - 1) + l) / period;
        out[i] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
      }
      return out;
    }

    // --- Data fetching ---
    async function fetchYahoo(symbol, range) {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=${range}&interval=1d`;
      const proxies = [
        (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
      ];
      let lastErr;
      for (const wrap of proxies) {
        try {
          const r = await fetch(wrap(url));
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const j = await r.json();
          if (j.chart?.error) throw new Error(j.chart.error.description || 'Yahoo error');
          if (!j.chart?.result?.[0]) throw new Error('סימול לא נמצא');
          return j.chart.result[0];
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error('בעיה בשליפת הנתונים');
    }

    function fmt(n, d = 2) {
      if (n == null || isNaN(n)) return '-';
      return Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function fmtVol(n) {
      if (n == null) return '-';
      if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
      return String(n);
    }

    // Map UI range -> { fetch: Yahoo range with enough history for MAs, show: # trading days to display }
    const RANGE_MAP = {
      '1mo': { fetch: '2y', show: 22 },
      '2mo': { fetch: '2y', show: 44 },
      '3mo': { fetch: '2y', show: 66 },
      '6mo': { fetch: '2y', show: 130 },
      '1y':  { fetch: '5y', show: 252 },
      '2y':  { fetch: '5y', show: 504 },
      '5y':  { fetch: '10y', show: 1260 },
      'max': { fetch: 'max', show: Infinity },
    };

    // Cache of last successful load, so MA changes don't refetch
    let lastData = null;

    function getMaPeriods() {
      const clamp = (v, d) => {
        const n = parseInt(v, 10);
        if (!Number.isFinite(n) || n < 2) return d;
        return Math.min(500, n);
      };
      return [
        clamp($('maP1').value, 20),
        clamp($('maP2').value, 150),
        clamp($('maP3').value, 200),
      ];
    }

    function renderMAs() {
      if (!lastData) return;
      const { rows, closeArr, showFrom } = lastData;
      const [p1, p2, p3] = getMaPeriods();
      const a1 = sma(closeArr, p1);
      const a2 = sma(closeArr, p2);
      const a3 = sma(closeArr, p3);
      const toLine = (arr) => rows.map((r, i) => (i < showFrom || arr[i] == null) ? null : { time: r.time, value: arr[i] }).filter(Boolean);
      ma20Series.setData(toLine(a1));
      ma150Series.setData(toLine(a2));
      ma200Series.setData(toLine(a3));
      const last = rows.length - 1;
      $('iMa20').textContent  = fmt(a1[last]);
      $('iMa150').textContent = fmt(a2[last]);
      $('iMa200').textContent = fmt(a3[last]);
      $('lblMa1').textContent = `MA${p1}:`;
      $('lblMa2').textContent = `MA${p2}:`;
      $('lblMa3').textContent = `MA${p3}:`;
      $('legMa1').textContent = `MA ${p1}`;
      $('legMa2').textContent = `MA ${p2}`;
      $('legMa3').textContent = `MA ${p3}`;
    }

    async function load() {
      const symbol = $('ticker').value.trim().toUpperCase();
      const uiRange = $('range').value;
      const cfg = RANGE_MAP[uiRange] || RANGE_MAP['2y'];
      if (!symbol) { statusEl.textContent = 'הקלד סימול'; return; }

      statusEl.classList.remove('error');
      statusEl.textContent = 'טוען נתונים עבור ' + symbol + '...';
      $('loadBtn').disabled = true;

      try {
        const result = await fetchYahoo(symbol, cfg.fetch);
        const ts = result.timestamp || [];
        const q = result.indicators?.quote?.[0] || {};
        const opens = q.open || [], highs = q.high || [], lows = q.low || [], closes = q.close || [], vols = q.volume || [];

        const rows = [];
        for (let i = 0; i < ts.length; i++) {
          if (closes[i] == null) continue;
          rows.push({
            time: ts[i],
            open: opens[i], high: highs[i], low: lows[i], close: closes[i], volume: vols[i] ?? 0,
          });
        }
        if (rows.length === 0) throw new Error('אין נתונים זמינים');

        const closeArr = rows.map(r => r.close);
        const rsiArr   = rsi(closeArr, 14);

        // Slice display window — indicators were computed on full history for proper lookback
        const showFrom = cfg.show === Infinity ? 0 : Math.max(0, rows.length - cfg.show);

        const candles = [];
        const vData = [];
        for (let i = showFrom; i < rows.length; i++) {
          const r = rows[i];
          candles.push({ time: r.time, open: r.open, high: r.high, low: r.low, close: r.close });
          vData.push({
            time: r.time,
            value: r.volume,
            color: (i > 0 && r.close < rows[i-1].close) ? 'rgba(239, 83, 80, 0.6)' : 'rgba(38, 166, 154, 0.6)',
          });
        }
        const toLine = (arr) => rows.map((r, i) => (i < showFrom || arr[i] == null) ? null : { time: r.time, value: arr[i] }).filter(Boolean);

        candleSeries.setData(candles);
        volumeSeries.setData(vData);
        rsiSeries.setData(toLine(rsiArr));

        lastData = { rows, closeArr, result, showFrom };
        renderMAs();

        priceChart.timeScale().fitContent();

        const last = rows.length - 1;
        const lastClose = closeArr[last];
        const prevClose = closeArr[last - 1] ?? lastClose;
        const change = lastClose - prevClose;
        const pct = (change / prevClose) * 100;
        const meta = result.meta || {};
        $('iSymbol').textContent = meta.symbol || symbol;
        $('iPrice').textContent = fmt(lastClose) + (meta.currency ? ' ' + meta.currency : '');
        const chEl = $('iChange');
        chEl.textContent = (change >= 0 ? '+' : '') + fmt(change) + ' (' + (pct >= 0 ? '+' : '') + fmt(pct) + '%)';
        chEl.className = 'val ' + (change >= 0 ? 'up' : 'down');
        const rsiVal = rsiArr[last];
        const rsiEl = $('iRsi');
        rsiEl.textContent = fmt(rsiVal, 1);
        rsiEl.className = 'val ' + (rsiVal >= 70 ? 'down' : rsiVal <= 30 ? 'up' : '');
        infoBar.style.display = 'flex';

        const shown = rows.length - showFrom;
        statusEl.textContent = `מציג ${shown} ימי מסחר (מתוך ${rows.length} שנטענו) · נפח אחרון: ${fmtVol(rows[last].volume)}`;
      } catch (e) {
        statusEl.classList.add('error');
        statusEl.textContent = 'שגיאה: ' + (e.message || e);
        infoBar.style.display = 'none';
      } finally {
        $('loadBtn').disabled = false;
      }
    }

    $('loadBtn').addEventListener('click', load);
    $('ticker').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
    $('range').addEventListener('change', load);
    ['maP1', 'maP2', 'maP3'].forEach(id => {
      $(id).addEventListener('change', renderMAs);
      $(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') renderMAs(); });
    });

    load();
  </script>
</body>
</html>
